<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Canais Dark — Painel de Controle</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f172a;
      color: #e2e8f0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Layout principal ── */
    .layout {
      display: flex;
      flex: 1;
      min-height: 0;
    }

    .main {
      flex: 1;
      padding: 24px;
      overflow: auto;
      min-width: 0;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
    }

    header h1 { font-size: 1.5rem; font-weight: 700; color: #f1f5f9; }
    header span { font-size: 0.875rem; color: #64748b; }

    /* ── Cards ── */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 14px;
      margin-bottom: 28px;
    }

    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 18px;
    }

    .card .label {
      font-size: 0.72rem;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }

    .card .value { font-size: 2rem; font-weight: 700; color: #f1f5f9; }
    .card.pendente .value { color: #fbbf24; }
    .card.postado .value  { color: #34d399; }
    .card.erro .value     { color: #f87171; }

    /* ── Buttons ── */
    .actions { display: flex; gap: 10px; margin-bottom: 28px; flex-wrap: wrap; }

    button {
      padding: 9px 18px;
      border-radius: 8px;
      border: none;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.85; }
    .btn-primary   { background: #6366f1; color: #fff; }
    .btn-secondary { background: #334155; color: #e2e8f0; }
    .btn-success   { background: #059669; color: #fff; }
    .btn-danger    { background: #dc2626; color: #fff; }

    /* ── Table ── */
    table { width: 100%; border-collapse: collapse; background: #1e293b; border-radius: 12px; overflow: hidden; }
    thead th {
      background: #0f172a; padding: 11px 14px;
      text-align: left; font-size: 0.72rem; color: #64748b;
      text-transform: uppercase; letter-spacing: 0.05em;
    }
    tbody tr { border-top: 1px solid #334155; transition: background 0.15s; }
    tbody tr:hover { background: #263044; }
    tbody td {
      padding: 11px 14px; font-size: 0.875rem; color: #cbd5e1;
      max-width: 240px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    .badge {
      display: inline-block; padding: 2px 10px;
      border-radius: 9999px; font-size: 0.72rem; font-weight: 600;
    }
    .badge-pendente  { background: #78350f; color: #fbbf24; }
    .badge-postado   { background: #064e3b; color: #34d399; }
    .badge-erro      { background: #7f1d1d; color: #f87171; }

    a { color: #818cf8; text-decoration: none; }
    a:hover { text-decoration: underline; }

    .empty { text-align: center; padding: 48px; color: #475569; }

    #msg {
      display: none;
      background: #1e3a5f; border: 1px solid #3b82f6;
      color: #93c5fd; padding: 12px 16px;
      border-radius: 8px; margin-bottom: 16px;
    }

    .filter-bar { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
    .filter-bar button { padding: 6px 14px; font-size: 0.8rem; }
    .filter-bar button.active { background: #6366f1; color: #fff; }
    .filter-bar button:not(.active) { background: #334155; color: #94a3b8; }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 300px;
      min-width: 300px;
      background: #111827;
      border-left: 1px solid #1e293b;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    .sidebar-header {
      padding: 20px 18px 14px;
      font-size: 0.8rem;
      font-weight: 700;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      border-bottom: 1px solid #1e293b;
    }

    .sidebar-section {
      padding: 16px 18px;
      border-bottom: 1px solid #1e293b;
    }

    .sidebar-section-title {
      font-size: 0.78rem;
      font-weight: 700;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    /* ── Canal card na sidebar ── */
    .canal-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 9px 10px;
      border-radius: 8px;
      background: #1e293b;
      margin-bottom: 8px;
    }

    .canal-item:last-child { margin-bottom: 0; }

    .canal-info { min-width: 0; }
    .canal-name { font-size: 0.875rem; font-weight: 600; color: #f1f5f9; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .canal-meta { font-size: 0.72rem; color: #64748b; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .token-badge {
      flex-shrink: 0;
      width: 8px; height: 8px;
      border-radius: 50%;
      margin-left: 10px;
    }
    .token-valid   { background: #34d399; box-shadow: 0 0 6px #34d399; }
    .token-invalid { background: #f87171; box-shadow: 0 0 6px #f87171; }
    .token-missing { background: #fbbf24; box-shadow: 0 0 6px #fbbf24; }
    .token-checking { background: #64748b; animation: pulse 1.2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

    /* ── Formulário novo canal ── */
    .form-group { margin-bottom: 12px; }
    .form-group label { display: block; font-size: 0.75rem; color: #94a3b8; margin-bottom: 4px; }
    .form-group input, .form-group select {
      width: 100%;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 6px;
      padding: 8px 10px;
      color: #e2e8f0;
      font-size: 0.8rem;
      outline: none;
    }
    .form-group input:focus, .form-group select:focus { border-color: #6366f1; }

    .btn-full { width: 100%; padding: 10px; font-size: 0.875rem; border-radius: 8px; border: none; font-weight: 600; cursor: pointer; }

    /* ── Toggle form ── */
    #form-canal { display: none; margin-top: 14px; }
    #form-canal.open { display: block; }

    /* ── Modal ── */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      width: 90%;
      max-width: 600px;
      max-height: 85vh;
      overflow-y: auto;
      padding: 28px;
      position: relative;
    }

    .modal h2 { font-size: 1.1rem; font-weight: 700; margin-bottom: 20px; color: #f1f5f9; }

    .modal-close {
      position: absolute; top: 16px; right: 16px;
      background: none; border: none; color: #64748b;
      font-size: 1.2rem; cursor: pointer; padding: 4px 8px;
    }
    .modal-close:hover { color: #f1f5f9; }

    .step {
      margin-bottom: 20px;
      background: #0f172a;
      border-radius: 10px;
      padding: 14px 16px;
    }

    .step-title {
      font-size: 0.75rem;
      font-weight: 700;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 10px;
    }

    .code-block {
      background: #020617;
      border: 1px solid #1e293b;
      border-radius: 6px;
      padding: 10px 12px;
      font-family: 'Courier New', monospace;
      font-size: 0.8rem;
      color: #7dd3fc;
      word-break: break-all;
      margin-bottom: 8px;
      position: relative;
    }

    .copy-btn {
      display: block;
      width: 100%;
      padding: 6px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 6px;
      color: #94a3b8;
      font-size: 0.75rem;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s;
    }
    .copy-btn:hover { background: #334155; color: #e2e8f0; }
    .copy-btn.copied { background: #064e3b; color: #34d399; border-color: #34d399; }

    @media (max-width: 768px) {
      .layout { flex-direction: column; }
      .sidebar { width: 100%; min-width: 0; border-left: none; border-top: 1px solid #1e293b; }
    }
  </style>
</head>
<body>

<div class="layout">
  <!-- ── CONTEÚDO PRINCIPAL ── -->
  <div class="main">
    <header>
      <h1>🎬 Canais Dark</h1>
      <span id="lastUpdate">Carregando...</span>
    </header>

    <div class="cards">
      <div class="card">
        <div class="label">Total</div>
        <div class="value" id="cnt-total">—</div>
      </div>
      <div class="card pendente">
        <div class="label">Pendentes</div>
        <div class="value" id="cnt-pendente">—</div>
      </div>
      <div class="card postado">
        <div class="label">Postados</div>
        <div class="value" id="cnt-postado">—</div>
      </div>
      <div class="card erro">
        <div class="label">Erros</div>
        <div class="value" id="cnt-erro">—</div>
      </div>
    </div>

    <div id="msg"></div>

    <div class="actions">
      <button class="btn-primary" onclick="processarAgora()">⚡ Processar Agora</button>
      <button class="btn-secondary" onclick="carregarDados()">🔄 Atualizar</button>
      <button class="btn-secondary" onclick="window.open('https://docs.google.com/spreadsheets/d/1dZJMKZtwr9pwJQMn4v9fpEjyb1Lpr1Sc8yqLomX3FwM', '_blank')">📊 Planilha</button>
    </div>

    <div class="filter-bar">
      <button class="active" onclick="filtrar('todos', this)">Todos</button>
      <button onclick="filtrar('Pendente', this)">Pendentes</button>
      <button onclick="filtrar('Postado', this)">Postados</button>
      <button onclick="filtrar('Erro', this)">Erros</button>
    </div>

    <table>
      <thead>
        <tr>
          <th>Canal</th>
          <th>Arquivo</th>
          <th>Título SEO</th>
          <th>Status</th>
          <th>YouTube</th>
          <th>Detectado</th>
        </tr>
      </thead>
      <tbody id="tbody">
        <tr><td colspan="6" class="empty">Carregando...</td></tr>
      </tbody>
    </table>
  </div>

  <!-- ── SIDEBAR ADMIN ── -->
  <aside class="sidebar">
    <div class="sidebar-header">⚙️ Administração</div>

    <!-- Canais -->
    <div class="sidebar-section">
      <div class="sidebar-section-title">
        <span>Canais</span>
        <button class="btn-secondary" style="padding:3px 10px;font-size:0.72rem;" onclick="carregarCanais()">↻</button>
      </div>
      <div id="canais-list">
        <div style="color:#475569;font-size:0.8rem;">Carregando...</div>
      </div>
      <button class="btn-full btn-primary" style="margin-top:14px;" onclick="toggleFormCanal()">
        + Adicionar Canal
      </button>

      <!-- Formulário Novo Canal -->
      <div id="form-canal">
        <div style="height:1px;background:#1e293b;margin:14px 0;"></div>
        <div class="form-group">
          <label>Nome do canal *</label>
          <input type="text" id="f-nome" placeholder="Ex: Canal Político" />
        </div>
        <div class="form-group">
          <label>Email YouTube *</label>
          <input type="email" id="f-email" placeholder="conta@gmail.com" />
        </div>
        <div class="form-group">
          <label>URL do canal</label>
          <input type="text" id="f-url" placeholder="https://youtube.com/@canal" />
        </div>
        <div class="form-group">
          <label>Nicho</label>
          <select id="f-nicho">
            <option value="político">Político</option>
            <option value="cristão">Cristão</option>
            <option value="frutas">Frutas</option>
            <option value="default">Entretenimento (default)</option>
          </select>
        </div>
        <div class="form-group">
          <label>Categoria YouTube</label>
          <select id="f-categoria">
            <option value="22">Pessoas e Blogs (22)</option>
            <option value="25">Notícias e Política (25)</option>
            <option value="24">Entretenimento (24)</option>
            <option value="28">Ciência e Tecnologia (28)</option>
            <option value="17">Esportes (17)</option>
            <option value="26">Como fazer e estilo (26)</option>
          </select>
        </div>
        <div class="form-group">
          <label>Drive ID — Aguardando *</label>
          <input type="text" id="f-drive-ag" placeholder="1abc...xyz" />
        </div>
        <div class="form-group">
          <label>Drive ID — Publicados *</label>
          <input type="text" id="f-drive-pub" placeholder="1abc...xyz" />
        </div>
        <button class="btn-full btn-success" onclick="adicionarCanal()">Gerar Instruções →</button>
      </div>
    </div>

    <!-- Adicionar à Fila -->
    <div class="sidebar-section">
      <div class="sidebar-section-title">Adicionar à Fila</div>
      <div style="display:flex;flex-direction:column;gap:8px;">
        <input id="fila-url" type="url" placeholder="URL do YouTube..." style="background:#1e293b;border:1px solid #334155;color:#e2e8f0;border-radius:6px;padding:8px 10px;font-size:0.82rem;width:100%;box-sizing:border-box;" />
        <select id="fila-canal" style="background:#1e293b;border:1px solid #334155;color:#e2e8f0;border-radius:6px;padding:8px 10px;font-size:0.82rem;width:100%;box-sizing:border-box;">
          <option value="">Selecionar canal...</option>
        </select>
        <button class="btn-full btn-primary" onclick="adicionarVideoNaFila()">⬇️ Baixar e Enfileirar</button>
        <div id="fila-status" style="font-size:0.78rem;min-height:20px;"></div>
      </div>
    </div>

    <!-- Canais de Referência -->
    <div class="sidebar-section">
      <div class="sidebar-section-title">
        <span>Canais de Referência</span>
        <button class="btn-secondary" style="padding:3px 10px;font-size:0.72rem;" onclick="carregarReferencias()">↻</button>
      </div>
      <div id="refs-list" style="margin-bottom:10px;">
        <div style="color:#475569;font-size:0.8rem;">Carregando...</div>
      </div>
      <div style="display:flex;flex-direction:column;gap:6px;">
        <select id="ref-canal" style="background:#1e293b;border:1px solid #334155;color:#e2e8f0;border-radius:6px;padding:7px 10px;font-size:0.8rem;width:100%;box-sizing:border-box;">
          <option value="">Canal destino...</option>
        </select>
        <input id="ref-url" type="url" placeholder="URL do canal (ex: @kimkataguiri)" style="background:#1e293b;border:1px solid #334155;color:#e2e8f0;border-radius:6px;padding:7px 10px;font-size:0.8rem;width:100%;box-sizing:border-box;" />
        <button class="btn-full btn-primary" style="font-size:0.8rem;" onclick="adicionarReferencia()">+ Adicionar</button>
        <div id="ref-status" style="font-size:0.75rem;min-height:16px;"></div>
      </div>
    </div>

    <!-- Ações Rápidas -->
    <div class="sidebar-section">
      <div class="sidebar-section-title">Ações Rápidas</div>
      <button class="btn-full btn-secondary" style="margin-bottom:8px;" onclick="verificarTodosTokens()">
        🔍 Verificar Tokens
      </button>
    </div>
  </aside>
</div>

<!-- ── MODAL DE INSTRUÇÕES ── -->
<div class="modal-overlay" id="modal-overlay" onclick="fecharModal(event)">
  <div class="modal">
    <button class="modal-close" onclick="document.getElementById('modal-overlay').classList.remove('open')">✕</button>
    <h2>✅ Canal configurado — Siga os 4 passos</h2>
    <div id="modal-content"></div>
    <button class="btn-full btn-secondary" style="margin-top:8px;" onclick="document.getElementById('modal-overlay').classList.remove('open')">
      Fechar
    </button>
  </div>
</div>

<script>
  let todosVideos = [];
  let filtroAtual = 'todos';

  // ── Dashboard ──────────────────────────────────────────────────────────────

  async function carregarDados() {
    document.getElementById('lastUpdate').textContent = 'Atualizando...';
    try {
      const r = await fetch('/api/status');
      const data = await r.json();
      todosVideos = data.videos || [];
      renderizarTabela();
      atualizarContadores();
      document.getElementById('lastUpdate').textContent =
        'Atualizado: ' + new Date().toLocaleTimeString('pt-BR');
    } catch (e) {
      mostrarMsg('Erro ao carregar dados: ' + e.message, 'erro');
    }
  }

  function atualizarContadores() {
    const s = (v) => (v.status || 'Pendente');
    document.getElementById('cnt-total').textContent   = todosVideos.length;
    document.getElementById('cnt-pendente').textContent = todosVideos.filter(v => s(v) === 'Pendente').length;
    document.getElementById('cnt-postado').textContent  = todosVideos.filter(v => s(v) === 'Postado').length;
    document.getElementById('cnt-erro').textContent     = todosVideos.filter(v => s(v) === 'Erro').length;
  }

  function filtrar(status, btn) {
    filtroAtual = status;
    document.querySelectorAll('.filter-bar button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderizarTabela();
  }

  function renderizarTabela() {
    const tbody = document.getElementById('tbody');
    const lista = filtroAtual === 'todos'
      ? todosVideos
      : todosVideos.filter(v => (v.status || 'Pendente') === filtroAtual);

    if (lista.length === 0) {
      tbody.innerHTML = '<tr><td colspan="6" class="empty">Nenhum vídeo encontrado.</td></tr>';
      return;
    }

    tbody.innerHTML = lista.map(v => {
      const status = v.status || 'Pendente';
      const badgeClass = status === 'Postado' ? 'badge-postado'
                       : status === 'Erro'    ? 'badge-erro'
                       : 'badge-pendente';
      const ytLink = v.linkYoutube
        ? `<a href="${v.linkYoutube}" target="_blank">Assistir</a>`
        : '—';
      return `<tr>
        <td title="${v.canal}">${v.canal || '—'}</td>
        <td title="${v.nomeArquivo}">${v.nomeArquivo || '—'}</td>
        <td title="${v.tituloYoutube || ''}">${v.tituloYoutube || '—'}</td>
        <td><span class="badge ${badgeClass}">${status}</span></td>
        <td>${ytLink}</td>
        <td>${v.dataDeteccao || '—'}</td>
      </tr>`;
    }).join('');
  }

  async function processarAgora() {
    mostrarMsg('Processando... aguarde o próximo ciclo.', 'info');
    try {
      await fetch('/api/processar-agora', { method: 'POST' });
      setTimeout(carregarDados, 3000);
    } catch (e) {
      mostrarMsg('Erro: ' + e.message, 'erro');
    }
  }

  function mostrarMsg(texto, tipo) {
    const el = document.getElementById('msg');
    el.textContent = texto;
    el.style.display = 'block';
    el.style.borderColor = tipo === 'erro' ? '#ef4444' : '#3b82f6';
    setTimeout(() => { el.style.display = 'none'; }, 5000);
  }

  // ── Sidebar — Canais ───────────────────────────────────────────────────────

  async function carregarCanais() {
    const el = document.getElementById('canais-list');
    el.innerHTML = '<div style="color:#475569;font-size:0.8rem;">Verificando tokens...</div>';
    try {
      const r = await fetch('/api/canais');
      const data = await r.json();
      if (!data.success) throw new Error(data.error);

      el.innerHTML = data.canais.map(c => {
        const statusClass = c.tokenStatus === 'valid'    ? 'token-valid'
                          : c.tokenStatus === 'invalid'  ? 'token-invalid'
                          : c.tokenStatus === 'missing'  ? 'token-missing'
                          : 'token-checking';
        const statusTip = c.tokenStatus === 'valid'   ? 'Token válido'
                        : c.tokenStatus === 'invalid' ? 'Token expirado'
                        : c.tokenStatus === 'missing' ? 'Token não configurado'
                        : 'Verificando...';
        return `<div class="canal-item" title="${statusTip}">
          <div class="canal-info">
            <div class="canal-name">${c.name}</div>
            <div class="canal-meta">${c.nicho} · porta ${c.oauthPort}</div>
          </div>
          <div class="token-badge ${statusClass}" title="${statusTip}"></div>
        </div>`;
      }).join('');

      // Popula dropdowns que dependem da lista de canais
      ['fila-canal', 'ref-canal'].forEach(id => {
        const sel = document.getElementById(id);
        const current = sel.value;
        sel.innerHTML = (id === 'fila-canal' ? '<option value="">Selecionar canal...</option>' : '<option value="">Canal destino...</option>') +
          data.canais.map(c => `<option value="${c.key}">${c.name}</option>`).join('');
        if (current) sel.value = current;
      });
    } catch (e) {
      el.innerHTML = `<div style="color:#f87171;font-size:0.8rem;">Erro: ${e.message}</div>`;
    }
  }

  async function verificarTodosTokens() {
    await carregarCanais();
    mostrarMsg('Tokens verificados.', 'info');
  }

  function toggleFormCanal() {
    const f = document.getElementById('form-canal');
    f.classList.toggle('open');
  }

  async function adicionarCanal() {
    const nome         = document.getElementById('f-nome').value.trim();
    const youtubeEmail = document.getElementById('f-email').value.trim();
    const youtubeUrl   = document.getElementById('f-url').value.trim();
    const nicho        = document.getElementById('f-nicho').value;
    const youtubeCategory = document.getElementById('f-categoria').value;
    const driveAguardando = document.getElementById('f-drive-ag').value.trim();
    const drivePublicados = document.getElementById('f-drive-pub').value.trim();

    if (!nome || !youtubeEmail || !driveAguardando || !drivePublicados) {
      mostrarMsg('Preencha todos os campos obrigatórios (*)', 'erro');
      return;
    }

    try {
      const r = await fetch('/api/canais', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nome, youtubeEmail, youtubeUrl, nicho, youtubeCategory, driveAguardando, drivePublicados }),
      });
      const data = await r.json();
      if (!data.success) throw new Error(data.error);

      abrirModalInstrucoes(data);

      // Limpa o formulário
      ['f-nome','f-email','f-url','f-drive-ag','f-drive-pub'].forEach(id => {
        document.getElementById(id).value = '';
      });
      document.getElementById('form-canal').classList.remove('open');
    } catch (e) {
      mostrarMsg('Erro: ' + e.message, 'erro');
    }
  }

  // ── Modal de Instruções ────────────────────────────────────────────────────

  function abrirModalInstrucoes(data) {
    const content = document.getElementById('modal-content');
    content.innerHTML = `
      <div class="step">
        <div class="step-title">Passo 1 — Google Cloud Console</div>
        <p style="font-size:0.8rem;color:#94a3b8;margin-bottom:8px;">
          Adicione este URI de redirecionamento OAuth em <strong>APIs &amp; Services → Credentials → OAuth 2.0 Client</strong>:
        </p>
        <div class="code-block">${data.redirectUri}</div>
        <button class="copy-btn" onclick="copiar(this, '${data.redirectUri}')">Copiar URI</button>
      </div>

      <div class="step">
        <div class="step-title">Passo 2 — Obter Token (rodar localmente)</div>
        <p style="font-size:0.8rem;color:#94a3b8;margin-bottom:8px;">
          Execute no terminal do projeto (na sua máquina), com a conta <strong>${document.getElementById('f-email') ? '' : ''}</strong>:
        </p>
        <div class="code-block">node ${data.authScriptPath}</div>
        <button class="copy-btn" onclick="copiar(this, 'node ${data.authScriptPath}')">Copiar comando</button>
        <p style="font-size:0.75rem;color:#64748b;margin-top:8px;">
          O script abrirá uma URL no navegador. Faça login com a conta YouTube do canal e copie o token exibido no terminal.
        </p>
      </div>

      <div class="step">
        <div class="step-title">Passo 3 — Adicionar no Coolify</div>
        <p style="font-size:0.8rem;color:#94a3b8;margin-bottom:8px;">
          Em <strong>Coolify → canais-dark → Environment Variables</strong>, adicione:
        </p>
        <div class="code-block">${data.refreshTokenEnv}=<span style="color:#fbbf24">&lt;token obtido no passo 2&gt;</span></div>
        <button class="copy-btn" onclick="copiar(this, '${data.refreshTokenEnv}=')">Copiar nome da variável</button>
      </div>

      <div class="step">
        <div class="step-title">Passo 4 — Adicionar ao channels.js</div>
        <p style="font-size:0.8rem;color:#94a3b8;margin-bottom:8px;">
          Adicione este trecho ao objeto <code>CHANNELS</code> em <code>src/channels.js</code> e faça commit:
        </p>
        <div class="code-block" style="white-space:pre;">${escapeHtml(data.channelsSnippet)}</div>
        <button class="copy-btn" onclick="copiar(this, ${JSON.stringify(data.channelsSnippet)})">Copiar snippet</button>
      </div>
    `;
    document.getElementById('modal-overlay').classList.add('open');
  }

  function fecharModal(e) {
    if (e.target === document.getElementById('modal-overlay')) {
      document.getElementById('modal-overlay').classList.remove('open');
    }
  }

  function copiar(btn, texto) {
    navigator.clipboard.writeText(texto).then(() => {
      btn.textContent = '✓ Copiado!';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = btn.textContent.includes('URI') ? 'Copiar URI'
          : btn.textContent.includes('variável') ? 'Copiar nome da variável'
          : btn.textContent.includes('snippet')  ? 'Copiar snippet'
          : 'Copiar comando';
        btn.classList.remove('copied');
      }, 2000);
    });
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── Canais de Referência ───────────────────────────────────────────────────

  async function carregarReferencias() {
    const el = document.getElementById('refs-list');
    el.innerHTML = '<div style="color:#475569;font-size:0.8rem;">Carregando...</div>';
    try {
      const r = await fetch('/api/referencia');
      const data = await r.json();
      if (!data.success) throw new Error(data.error);
      if (data.referencias.length === 0) {
        el.innerHTML = '<div style="color:#475569;font-size:0.78rem;">Nenhum canal configurado.</div>';
        return;
      }
      // Agrupa por canal destino
      const grupos = {};
      for (const ref of data.referencias) {
        if (!grupos[ref.channelName]) grupos[ref.channelName] = [];
        grupos[ref.channelName].push(ref);
      }
      el.innerHTML = Object.entries(grupos).map(([name, refs]) => `
        <div style="margin-bottom:8px;">
          <div style="font-size:0.75rem;font-weight:700;color:#94a3b8;margin-bottom:4px;">${escapeHtml(name)}</div>
          ${refs.map(ref => `
            <div style="display:flex;align-items:center;gap:6px;margin-bottom:3px;">
              <span style="font-size:0.78rem;color:#cbd5e1;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${escapeHtml(ref.urlReferencia)}">↳ ${escapeHtml(ref.urlReferencia)}</span>
              <button onclick="removerReferencia(${ref.rowIndex})" style="background:none;border:none;color:#f87171;cursor:pointer;font-size:0.85rem;padding:0 2px;" title="Remover">×</button>
            </div>`).join('')}
        </div>`).join('');
    } catch (e) {
      el.innerHTML = `<div style="color:#f87171;font-size:0.78rem;">Erro: ${escapeHtml(e.message)}</div>`;
    }
  }

  async function adicionarReferencia() {
    const channelKey = document.getElementById('ref-canal').value;
    const url        = document.getElementById('ref-url').value.trim();
    const statusEl   = document.getElementById('ref-status');
    if (!channelKey) { statusEl.innerHTML = '<span style="color:#f87171;">Selecione um canal.</span>'; return; }
    if (!url)        { statusEl.innerHTML = '<span style="color:#f87171;">Informe a URL do canal.</span>'; return; }
    statusEl.innerHTML = '<span style="color:#94a3b8;">Salvando...</span>';
    try {
      const r = await fetch('/api/referencia', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ channelKey, urlReferencia: url }),
      });
      const data = await r.json();
      if (!data.success) throw new Error(data.error);
      document.getElementById('ref-url').value = '';
      statusEl.innerHTML = '<span style="color:#4ade80;">✅ Adicionado!</span>';
      carregarReferencias();
    } catch (e) {
      statusEl.innerHTML = `<span style="color:#f87171;">❌ ${escapeHtml(e.message)}</span>`;
    }
  }

  async function removerReferencia(rowIndex) {
    if (!confirm('Remover este canal de referência?')) return;
    try {
      const r = await fetch(`/api/referencia/${rowIndex}`, { method: 'DELETE' });
      const data = await r.json();
      if (!data.success) throw new Error(data.error);
      carregarReferencias();
    } catch (e) {
      alert('Erro ao remover: ' + e.message);
    }
  }

  // ── Adicionar à Fila ───────────────────────────────────────────────────────

  async function adicionarVideoNaFila() {
    const url       = document.getElementById('fila-url').value.trim();
    const channelKey = document.getElementById('fila-canal').value;
    const statusEl  = document.getElementById('fila-status');

    if (!url)        { statusEl.innerHTML = '<span style="color:#f87171;">Informe a URL do vídeo.</span>'; return; }
    if (!channelKey) { statusEl.innerHTML = '<span style="color:#f87171;">Selecione um canal.</span>'; return; }

    statusEl.innerHTML = '<span style="color:#94a3b8;">⏳ Baixando e enviando para o Drive...</span>';
    document.querySelector('#fila-status').closest('.sidebar-section').querySelectorAll('button').forEach(b => b.disabled = true);

    try {
      const r = await fetch('/api/fila/adicionar', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ youtubeUrl: url, channelKey }),
      });
      const data = await r.json();
      if (!data.success) throw new Error(data.error);

      statusEl.innerHTML = `<span style="color:#4ade80;">✅ Adicionado: ${escapeHtml(data.title)}</span>`;
      document.getElementById('fila-url').value = '';
      carregarDados();
    } catch (e) {
      statusEl.innerHTML = `<span style="color:#f87171;">❌ ${escapeHtml(e.message)}</span>`;
    } finally {
      document.querySelector('#fila-status').closest('.sidebar-section').querySelectorAll('button').forEach(b => b.disabled = false);
    }
  }

  // ── Init ───────────────────────────────────────────────────────────────────
  carregarDados();
  carregarCanais();
  carregarReferencias();
  setInterval(carregarDados, 60000);
</script>

</body>
</html>
