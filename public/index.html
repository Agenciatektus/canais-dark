<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Canais Dark — Painel de Controle</title>
  <style>
    :root {
      /* Superfícies */
      --bg-base:       #0d1117;
      --bg-surface:    #161b22;
      --bg-elevated:   #21262d;
      --bg-hover:      #2d333b;
      --border:        #30363d;
      --border-subtle: #21262d;

      /* Texto */
      --text-primary:   #f0f6fc;
      --text-secondary: #8b949e;
      --text-muted:     #484f58;

      /* Acento — azul ops */
      --accent:        #58a6ff;
      --accent-subtle: rgba(88, 166, 255, 0.12);

      /* Semânticas */
      --success:        #3fb950;
      --success-subtle: rgba(63, 185, 80, 0.12);
      --warning:        #d29922;
      --warning-subtle: rgba(210, 153, 34, 0.12);
      --danger:         #f85149;
      --danger-subtle:  rgba(248, 81, 73, 0.12);

      /* Tipografia */
      --text-xs:   11px;
      --text-sm:   13px;
      --text-base: 14px;
      --text-md:   16px;
      --text-xl:   32px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg-base);
      color: var(--text-primary);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: var(--text-base);
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Layout ── */
    .layout { display: flex; flex: 1; min-height: 0; }

    .main {
      flex: 1;
      padding: 24px 32px;
      overflow: auto;
      min-width: 0;
    }

    /* ── Page header ── */
    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border-subtle);
    }

    .page-title {
      font-size: var(--text-md);
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.01em;
    }

    .page-title .subtitle {
      font-size: var(--text-xs);
      color: var(--text-muted);
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-left: 8px;
    }

    .last-update { font-size: var(--text-xs); color: var(--text-muted); }

    /* ── Stat cards ── */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }

    .card {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-left-width: 3px;
      border-radius: 8px;
      padding: 16px;
    }

    .card--neutral { border-left-color: var(--border); }
    .card--warning { border-left-color: var(--warning); }
    .card--success { border-left-color: var(--success); }
    .card--danger  { border-left-color: var(--danger);  }

    .card__label {
      font-size: var(--text-xs);
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .card__value {
      font-size: var(--text-xl);
      font-weight: 700;
      color: var(--text-primary);
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 7px 16px;
      border-radius: 6px;
      border: 1px solid transparent;
      font-size: var(--text-sm);
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      white-space: nowrap;
      line-height: 1.4;
    }

    .btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-primary { background: var(--accent); color: #0d1117; border-color: var(--accent); }
    .btn-primary:hover:not(:disabled) { background: #79b8ff; border-color: #79b8ff; }

    .btn-secondary { background: var(--bg-elevated); color: var(--text-secondary); border-color: var(--border); }
    .btn-secondary:hover:not(:disabled) { background: var(--bg-hover); color: var(--text-primary); }

    .btn-ghost { background: transparent; color: var(--text-secondary); border-color: transparent; }
    .btn-ghost:hover:not(:disabled) { background: var(--bg-elevated); color: var(--text-primary); }

    .btn-full { width: 100%; justify-content: center; }

    /* ── Actions ── */
    .actions { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }

    /* ── Filter bar ── */
    .filter-bar { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }

    .filter-btn {
      padding: 4px 12px;
      border-radius: 9999px;
      border: 1px solid var(--border);
      font-size: var(--text-xs);
      font-weight: 600;
      cursor: pointer;
      background: var(--bg-elevated);
      color: var(--text-secondary);
      transition: all 0.15s;
      letter-spacing: 0.03em;
    }

    .filter-btn:hover { color: var(--text-primary); border-color: var(--text-muted); }
    .filter-btn.active { background: var(--accent); color: var(--bg-base); border-color: var(--accent); }
    .filter-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

    /* ── Table ── */
    .table-wrap { border-radius: 8px; border: 1px solid var(--border); overflow: hidden; }

    table { width: 100%; border-collapse: collapse; background: var(--bg-surface); }

    thead th {
      background: var(--bg-surface);
      padding: 10px 16px;
      text-align: left;
      font-size: var(--text-xs);
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-weight: 600;
      border-bottom: 1px solid var(--border);
    }

    tbody tr { border-top: 1px solid var(--border-subtle); transition: background 0.1s; }
    tbody tr:first-child { border-top: none; }
    tbody tr:hover { background: var(--bg-elevated); }

    tbody td {
      padding: 10px 16px;
      font-size: var(--text-sm);
      color: var(--text-secondary);
      max-width: 220px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    tbody td:first-child { color: var(--text-primary); font-weight: 500; }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: var(--text-xs);
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    .badge--pending { background: var(--warning-subtle); color: var(--warning); }
    .badge--success { background: var(--success-subtle); color: var(--success); }
    .badge--danger  { background: var(--danger-subtle);  color: var(--danger);  }

    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    .empty { text-align: center; padding: 48px; color: var(--text-muted); font-size: var(--text-sm); }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 320px;
      min-width: 320px;
      background: var(--bg-surface);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    .sidebar__header {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar__title {
      font-size: var(--text-xs);
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    /* ── Sidebar sections (collapsible) ── */
    .sidebar__section { border-bottom: 1px solid var(--border-subtle); }

    .section-toggle {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 20px;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-secondary);
      font-size: var(--text-xs);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      transition: color 0.15s;
    }

    .section-toggle:hover { color: var(--text-primary); }
    .section-toggle:focus-visible { outline: 2px solid var(--accent); outline-offset: -2px; }

    .section-chevron {
      font-size: 9px;
      color: var(--text-muted);
      transition: transform 0.2s ease;
    }

    .sidebar__section.open .section-chevron { transform: rotate(90deg); }

    .section-body { display: none; padding: 4px 20px 16px; }
    .sidebar__section.open .section-body { display: block; }

    /* ── Canal cards ── */
    .canal-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      border-radius: 6px;
      background: var(--bg-elevated);
      margin-bottom: 6px;
    }

    .canal-item:last-child { margin-bottom: 0; }

    .canal-info { min-width: 0; flex: 1; }

    .canal-name {
      font-size: var(--text-sm);
      font-weight: 600;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .canal-meta { font-size: var(--text-xs); color: var(--text-muted); margin-top: 1px; }

    .token-dot {
      flex-shrink: 0;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      margin-left: 10px;
    }

    .token-valid    { background: var(--success); box-shadow: 0 0 5px var(--success); }
    .token-invalid  { background: var(--danger);  box-shadow: 0 0 5px var(--danger);  }
    .token-missing  { background: var(--warning); box-shadow: 0 0 5px var(--warning); }
    .token-checking { background: var(--text-muted); animation: blink 1.2s ease-in-out infinite; }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

    /* ── Form novo canal ── */
    #form-canal { display: none; margin-top: 4px; }
    #form-canal.open { display: block; }

    /* ── Forms ── */
    .form-group { margin-bottom: 10px; }

    .form-group label {
      display: block;
      font-size: var(--text-xs);
      color: var(--text-secondary);
      font-weight: 500;
      margin-bottom: 4px;
    }

    .form-group input,
    .form-group select,
    .form-input,
    .form-select {
      width: 100%;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 7px 12px;
      color: var(--text-primary);
      font-size: var(--text-sm);
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-input:focus,
    .form-select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-subtle);
    }

    .form-group select option,
    .form-select option { background: var(--bg-elevated); }

    .divider { height: 1px; background: var(--border-subtle); margin: 12px 0; }

    /* ── Reference items ── */
    .ref-group { margin-bottom: 10px; }
    .ref-group:last-child { margin-bottom: 0; }

    .ref-group__name {
      font-size: var(--text-xs);
      font-weight: 700;
      color: var(--text-secondary);
      margin-bottom: 4px;
    }

    .ref-item { display: flex; align-items: center; gap: 6px; padding: 2px 0; }

    .ref-item__url {
      font-size: var(--text-xs);
      color: var(--text-muted);
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .ref-item__del {
      flex-shrink: 0;
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 15px;
      padding: 0 2px;
      line-height: 1;
      transition: color 0.15s;
    }

    .ref-item__del:hover { color: var(--danger); }

    /* ── Status helpers ── */
    .status-text { font-size: var(--text-xs); min-height: 16px; }
    .status-ok   { color: var(--success); }
    .status-err  { color: var(--danger); }
    .status-info { color: var(--text-muted); }

    /* ── Modal ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.75);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      width: 90%;
      max-width: 580px;
      max-height: 88vh;
      overflow-y: auto;
      padding: 24px;
      position: relative;
    }

    .modal__title { font-size: var(--text-md); font-weight: 700; margin-bottom: 20px; color: var(--text-primary); }

    .modal__close {
      position: absolute;
      top: 16px;
      right: 16px;
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 16px;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 4px;
      line-height: 1;
      transition: color 0.15s, background 0.15s;
    }

    .modal__close:hover { color: var(--text-primary); background: var(--bg-elevated); }

    .step {
      margin-bottom: 16px;
      background: var(--bg-base);
      border-radius: 8px;
      padding: 14px 16px;
      border: 1px solid var(--border-subtle);
    }

    .step__title {
      font-size: var(--text-xs);
      font-weight: 700;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 8px;
    }

    .step__desc { font-size: var(--text-sm); color: var(--text-secondary); margin-bottom: 8px; }

    .code-block {
      background: #010409;
      border: 1px solid var(--border-subtle);
      border-radius: 6px;
      padding: 10px 12px;
      font-family: 'Cascadia Code', 'Fira Code', 'Courier New', monospace;
      font-size: var(--text-sm);
      color: #79c0ff;
      word-break: break-all;
      margin-bottom: 8px;
    }

    .code-block[data-pre] { white-space: pre; }

    .copy-btn {
      display: block;
      width: 100%;
      padding: 5px;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--text-secondary);
      font-size: var(--text-xs);
      cursor: pointer;
      font-weight: 600;
      transition: all 0.15s;
    }

    .copy-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
    .copy-btn.copied { background: var(--success-subtle); color: var(--success); border-color: var(--success); }

    /* ── Toast ── */
    #toast-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 1000;
      pointer-events: none;
    }

    .toast {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      border-radius: 8px;
      padding: 12px 16px;
      font-size: var(--text-sm);
      color: var(--text-primary);
      max-width: 320px;
      animation: toastIn 0.2s ease;
      pointer-events: auto;
      line-height: 1.4;
    }

    .toast--success { border-left-color: var(--success); }
    .toast--error   { border-left-color: var(--danger); }
    .toast--info    { border-left-color: var(--accent); }

    @keyframes toastIn {
      from { transform: translateX(16px); opacity: 0; }
      to   { transform: translateX(0);    opacity: 1; }
    }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .layout { flex-direction: column; }
      .sidebar { width: 100%; min-width: 0; border-left: none; border-top: 1px solid var(--border); }
      .main { padding: 16px; }
      .cards { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

<div class="layout">

  <!-- ── CONTEÚDO PRINCIPAL ── -->
  <div class="main">
    <div class="page-header">
      <h1 class="page-title">Canais Dark <span class="subtitle">automation hub</span></h1>
      <span class="last-update" id="lastUpdate">Carregando...</span>
    </div>

    <div class="cards">
      <div class="card card--neutral">
        <div class="card__label">Total</div>
        <div class="card__value" id="cnt-total">—</div>
      </div>
      <div class="card card--warning">
        <div class="card__label">Pendentes</div>
        <div class="card__value" id="cnt-pendente">—</div>
      </div>
      <div class="card card--success">
        <div class="card__label">Postados</div>
        <div class="card__value" id="cnt-postado">—</div>
      </div>
      <div class="card card--danger">
        <div class="card__label">Erros</div>
        <div class="card__value" id="cnt-erro">—</div>
      </div>
    </div>

    <div class="actions">
      <button class="btn btn-primary" onclick="processarAgora()">▶ Processar Agora</button>
      <button class="btn btn-secondary" onclick="carregarDados()">↻ Atualizar</button>
      <button class="btn btn-secondary" onclick="window.open('https://docs.google.com/spreadsheets/d/1dZJMKZtwr9pwJQMn4v9fpEjyb1Lpr1Sc8yqLomX3FwM', '_blank')">↗ Planilha</button>
    </div>

    <div class="filter-bar">
      <button class="filter-btn active" onclick="filtrar('todos', this)">Todos</button>
      <button class="filter-btn" onclick="filtrar('Pendente', this)">Pendentes</button>
      <button class="filter-btn" onclick="filtrar('Postado', this)">Postados</button>
      <button class="filter-btn" onclick="filtrar('Erro', this)">Erros</button>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Canal</th>
            <th>Arquivo</th>
            <th>Título SEO</th>
            <th>Status</th>
            <th>YouTube</th>
            <th>Detectado</th>
          </tr>
        </thead>
        <tbody id="tbody">
          <tr><td colspan="6" class="empty">Carregando...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- ── SIDEBAR ── -->
  <aside class="sidebar">
    <div class="sidebar__header">
      <span class="sidebar__title">Administração</span>
    </div>

    <!-- Canais -->
    <div class="sidebar__section open" id="sec-canais">
      <button class="section-toggle" onclick="toggleSection('sec-canais')">
        <span>Canais</span>
        <span class="section-chevron">▶</span>
      </button>
      <div class="section-body">
        <div id="canais-list">
          <div class="status-text status-info">Verificando tokens...</div>
        </div>
        <button class="btn btn-secondary btn-full" style="margin-top:10px;" onclick="carregarCanais()">↻ Recarregar</button>
        <div class="divider"></div>
        <button class="btn btn-ghost btn-full" onclick="toggleFormCanal()">+ Novo canal</button>

        <!-- Formulário Novo Canal -->
        <div id="form-canal">
          <div class="divider"></div>
          <div class="form-group">
            <label>Nome do canal *</label>
            <input type="text" id="f-nome" placeholder="Ex: Canal Político" />
          </div>
          <div class="form-group">
            <label>Email YouTube *</label>
            <input type="email" id="f-email" placeholder="conta@gmail.com" />
          </div>
          <div class="form-group">
            <label>URL do canal</label>
            <input type="text" id="f-url" placeholder="https://youtube.com/@canal" />
          </div>
          <div class="form-group">
            <label>Nicho</label>
            <select id="f-nicho">
              <option value="político">Político</option>
              <option value="cristão">Cristão</option>
              <option value="frutas">Frutas</option>
              <option value="default">Entretenimento (default)</option>
            </select>
          </div>
          <div class="form-group">
            <label>Categoria YouTube</label>
            <select id="f-categoria">
              <option value="22">Pessoas e Blogs (22)</option>
              <option value="25">Notícias e Política (25)</option>
              <option value="24">Entretenimento (24)</option>
              <option value="28">Ciência e Tecnologia (28)</option>
              <option value="17">Esportes (17)</option>
              <option value="26">Como fazer e estilo (26)</option>
            </select>
          </div>
          <div class="form-group">
            <label>Drive ID — Aguardando *</label>
            <input type="text" id="f-drive-ag" placeholder="1abc...xyz" />
          </div>
          <div class="form-group">
            <label>Drive ID — Publicados *</label>
            <input type="text" id="f-drive-pub" placeholder="1abc...xyz" />
          </div>
          <button class="btn btn-primary btn-full" onclick="adicionarCanal()">Gerar Instruções →</button>
        </div>
      </div>
    </div>

    <!-- Adicionar à Fila -->
    <div class="sidebar__section open" id="sec-fila">
      <button class="section-toggle" onclick="toggleSection('sec-fila')">
        <span>Adicionar à Fila</span>
        <span class="section-chevron">▶</span>
      </button>
      <div class="section-body">
        <div class="form-group">
          <label>URL do vídeo</label>
          <input class="form-input" id="fila-url" type="url" placeholder="https://youtube.com/watch?v=..." />
        </div>
        <div class="form-group">
          <label>Canal destino</label>
          <select class="form-select" id="fila-canal">
            <option value="">Selecionar canal...</option>
          </select>
        </div>
        <button class="btn btn-primary btn-full" onclick="adicionarVideoNaFila()">↓ Baixar e Enfileirar</button>
        <div class="status-text" id="fila-status" style="margin-top:8px;"></div>
      </div>
    </div>

    <!-- Canais de Referência -->
    <div class="sidebar__section open" id="sec-refs">
      <button class="section-toggle" onclick="toggleSection('sec-refs')">
        <span>Canais de Referência</span>
        <span class="section-chevron">▶</span>
      </button>
      <div class="section-body">
        <div id="refs-list" style="margin-bottom:12px;">
          <div class="status-text status-info">Carregando...</div>
        </div>
        <div class="form-group">
          <label>Canal destino</label>
          <select class="form-select" id="ref-canal">
            <option value="">Canal destino...</option>
          </select>
        </div>
        <div class="form-group">
          <label>URL do canal de referência</label>
          <input class="form-input" id="ref-url" type="url" placeholder="https://youtube.com/@canal" />
        </div>
        <button class="btn btn-secondary btn-full" onclick="adicionarReferencia()">+ Adicionar</button>
        <div class="status-text" id="ref-status" style="margin-top:8px;"></div>
      </div>
    </div>

    <!-- Ações Rápidas -->
    <div class="sidebar__section open" id="sec-acoes">
      <button class="section-toggle" onclick="toggleSection('sec-acoes')">
        <span>Ações Rápidas</span>
        <span class="section-chevron">▶</span>
      </button>
      <div class="section-body">
        <div style="display:flex;flex-direction:column;gap:8px;">
          <button class="btn btn-secondary btn-full" onclick="verificarTodosTokens()">
            ◎ Verificar Tokens
          </button>
          <button class="btn btn-secondary btn-full" id="btn-executar-refs" onclick="executarReferencias()">
            ▷ Executar Referências Agora
          </button>
          <button class="btn btn-secondary btn-full" id="btn-corrigir-seo" onclick="corrigirSEOBatch()">
            ✎ Corrigir SEO (Cristão + Frutas)
          </button>
        </div>
      </div>
    </div>
  </aside>
</div>

<!-- ── MODAL DE INSTRUÇÕES ── -->
<div class="modal-overlay" id="modal-overlay" onclick="fecharModal(event)">
  <div class="modal">
    <button class="modal__close" onclick="document.getElementById('modal-overlay').classList.remove('open')">✕</button>
    <div class="modal__title">Canal configurado — Siga os 4 passos</div>
    <div id="modal-content"></div>
    <button class="btn btn-secondary btn-full" style="margin-top:8px;" onclick="document.getElementById('modal-overlay').classList.remove('open')">
      Fechar
    </button>
  </div>
</div>

<!-- Toast notifications -->
<div id="toast-container" aria-live="polite"></div>

<script>
  let todosVideos = [];
  let filtroAtual = 'todos';

  // ── Toast ───────────────────────────────────────────────────────────────────

  function toast(msg, type = 'info', duration = 5000) {
    const el = document.createElement('div');
    el.className = `toast toast--${type}`;
    el.textContent = msg;
    document.getElementById('toast-container').appendChild(el);
    setTimeout(() => el.remove(), duration);
  }

  // ── Dashboard ──────────────────────────────────────────────────────────────

  async function carregarDados() {
    document.getElementById('lastUpdate').textContent = 'Atualizando...';
    try {
      const r = await fetch('/api/status');
      const data = await r.json();
      todosVideos = data.videos || [];
      renderizarTabela();
      atualizarContadores();
      document.getElementById('lastUpdate').textContent =
        'Atualizado: ' + new Date().toLocaleTimeString('pt-BR');
    } catch (e) {
      toast('Erro ao carregar dados: ' + e.message, 'error');
    }
  }

  function atualizarContadores() {
    const s = (v) => (v.status || 'Pendente');
    document.getElementById('cnt-total').textContent    = todosVideos.length;
    document.getElementById('cnt-pendente').textContent = todosVideos.filter(v => s(v) === 'Pendente').length;
    document.getElementById('cnt-postado').textContent  = todosVideos.filter(v => s(v) === 'Postado').length;
    document.getElementById('cnt-erro').textContent     = todosVideos.filter(v => s(v) === 'Erro').length;
  }

  function filtrar(status, btn) {
    filtroAtual = status;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderizarTabela();
  }

  function renderizarTabela() {
    const tbody = document.getElementById('tbody');
    const lista = filtroAtual === 'todos'
      ? todosVideos
      : todosVideos.filter(v => (v.status || 'Pendente') === filtroAtual);

    if (lista.length === 0) {
      tbody.innerHTML = '<tr><td colspan="6" class="empty">Nenhum vídeo encontrado.</td></tr>';
      return;
    }

    tbody.innerHTML = lista.map(v => {
      const status = v.status || 'Pendente';
      const badgeClass = status === 'Postado' ? 'badge--success'
                       : status === 'Erro'    ? 'badge--danger'
                       : 'badge--pending';
      const ytLink = v.linkYoutube
        ? `<a href="${v.linkYoutube}" target="_blank">Assistir</a>`
        : '—';
      return `<tr>
        <td title="${v.canal}">${v.canal || '—'}</td>
        <td title="${v.nomeArquivo}">${v.nomeArquivo || '—'}</td>
        <td title="${v.tituloYoutube || ''}">${v.tituloYoutube || '—'}</td>
        <td><span class="badge ${badgeClass}">${status}</span></td>
        <td>${ytLink}</td>
        <td>${v.dataDeteccao || '—'}</td>
      </tr>`;
    }).join('');
  }

  async function processarAgora() {
    toast('Processando... aguarde o próximo ciclo.', 'info');
    try {
      await fetch('/api/processar-agora', { method: 'POST' });
      setTimeout(carregarDados, 3000);
    } catch (e) {
      toast('Erro: ' + e.message, 'error');
    }
  }

  // ── Sidebar — Seções ───────────────────────────────────────────────────────

  function toggleSection(id) {
    document.getElementById(id).classList.toggle('open');
  }

  // ── Sidebar — Canais ───────────────────────────────────────────────────────

  async function carregarCanais() {
    const el = document.getElementById('canais-list');
    el.innerHTML = '<div class="status-text status-info">Verificando tokens...</div>';
    try {
      const r = await fetch('/api/canais');
      const data = await r.json();
      if (!data.success) throw new Error(data.error);

      el.innerHTML = data.canais.map(c => {
        const statusClass = c.tokenStatus === 'valid'   ? 'token-valid'
                          : c.tokenStatus === 'invalid' ? 'token-invalid'
                          : c.tokenStatus === 'missing' ? 'token-missing'
                          : 'token-checking';
        const statusTip = c.tokenStatus === 'valid'   ? 'Token válido'
                        : c.tokenStatus === 'invalid' ? 'Token expirado'
                        : c.tokenStatus === 'missing' ? 'Token não configurado'
                        : 'Verificando...';
        return `<div class="canal-item" title="${statusTip}">
          <div class="canal-info">
            <div class="canal-name">${escapeHtml(c.name)}</div>
            <div class="canal-meta">${escapeHtml(c.nicho)} · porta ${c.oauthPort}</div>
          </div>
          <div class="token-dot ${statusClass}" title="${statusTip}"></div>
        </div>`;
      }).join('');

      // Popula dropdowns
      ['fila-canal', 'ref-canal'].forEach(id => {
        const sel = document.getElementById(id);
        const current = sel.value;
        sel.innerHTML = (id === 'fila-canal'
          ? '<option value="">Selecionar canal...</option>'
          : '<option value="">Canal destino...</option>') +
          data.canais.map(c => `<option value="${c.key}">${escapeHtml(c.name)}</option>`).join('');
        if (current) sel.value = current;
      });
    } catch (e) {
      el.innerHTML = `<div class="status-text status-err">Erro: ${escapeHtml(e.message)}</div>`;
    }
  }

  async function verificarTodosTokens() {
    await carregarCanais();
    toast('Tokens verificados.', 'info');
  }

  function toggleFormCanal() {
    document.getElementById('form-canal').classList.toggle('open');
  }

  async function adicionarCanal() {
    const nome            = document.getElementById('f-nome').value.trim();
    const youtubeEmail    = document.getElementById('f-email').value.trim();
    const youtubeUrl      = document.getElementById('f-url').value.trim();
    const nicho           = document.getElementById('f-nicho').value;
    const youtubeCategory = document.getElementById('f-categoria').value;
    const driveAguardando = document.getElementById('f-drive-ag').value.trim();
    const drivePublicados = document.getElementById('f-drive-pub').value.trim();

    if (!nome || !youtubeEmail || !driveAguardando || !drivePublicados) {
      toast('Preencha todos os campos obrigatórios (*)', 'error');
      return;
    }

    try {
      const r = await fetch('/api/canais', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nome, youtubeEmail, youtubeUrl, nicho, youtubeCategory, driveAguardando, drivePublicados }),
      });
      const data = await r.json();
      if (!data.success) throw new Error(data.error);

      abrirModalInstrucoes(data);
      ['f-nome','f-email','f-url','f-drive-ag','f-drive-pub'].forEach(id => {
        document.getElementById(id).value = '';
      });
      document.getElementById('form-canal').classList.remove('open');
    } catch (e) {
      toast('Erro: ' + e.message, 'error');
    }
  }

  // ── Modal de Instruções ────────────────────────────────────────────────────

  function abrirModalInstrucoes(data) {
    document.getElementById('modal-content').innerHTML = `
      <div class="step">
        <div class="step__title">Passo 1 — Google Cloud Console</div>
        <p class="step__desc">Adicione este URI de redirecionamento OAuth em <strong>APIs &amp; Services → Credentials → OAuth 2.0 Client</strong>:</p>
        <div class="code-block">${escapeHtml(data.redirectUri)}</div>
        <button class="copy-btn" onclick="copiar(this, '${escapeHtml(data.redirectUri)}')">Copiar URI</button>
      </div>

      <div class="step">
        <div class="step__title">Passo 2 — Obter Token (rodar localmente)</div>
        <p class="step__desc">Execute no terminal do projeto:</p>
        <div class="code-block">node ${escapeHtml(data.authScriptPath)}</div>
        <button class="copy-btn" onclick="copiar(this, 'node ${escapeHtml(data.authScriptPath)}')">Copiar comando</button>
      </div>

      <div class="step">
        <div class="step__title">Passo 3 — Adicionar no Coolify</div>
        <p class="step__desc">Em <strong>Coolify → canais-dark → Environment Variables</strong>:</p>
        <div class="code-block">${escapeHtml(data.refreshTokenEnv)}=&lt;token obtido no passo 2&gt;</div>
        <button class="copy-btn" onclick="copiar(this, '${escapeHtml(data.refreshTokenEnv)}=')">Copiar nome da variável</button>
      </div>

      <div class="step">
        <div class="step__title">Passo 4 — Adicionar ao channels.js</div>
        <p class="step__desc">Adicione ao objeto <code>CHANNELS</code> em <code>src/channels.js</code> e faça commit:</p>
        <div class="code-block" data-pre>${escapeHtml(data.channelsSnippet)}</div>
        <button class="copy-btn" onclick="copiar(this, ${JSON.stringify(data.channelsSnippet)})">Copiar snippet</button>
      </div>
    `;
    document.getElementById('modal-overlay').classList.add('open');
  }

  function fecharModal(e) {
    if (e.target === document.getElementById('modal-overlay')) {
      document.getElementById('modal-overlay').classList.remove('open');
    }
  }

  function copiar(btn, texto) {
    const label = btn.textContent;
    navigator.clipboard.writeText(texto).then(() => {
      btn.textContent = '✓ Copiado!';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = label; btn.classList.remove('copied'); }, 2000);
    });
  }

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // ── Canais de Referência ───────────────────────────────────────────────────

  async function carregarReferencias() {
    const el = document.getElementById('refs-list');
    el.innerHTML = '<div class="status-text status-info">Carregando...</div>';
    try {
      const r = await fetch('/api/referencia');
      const data = await r.json();
      if (!data.success) throw new Error(data.error);
      if (data.referencias.length === 0) {
        el.innerHTML = '<div class="status-text status-info">Nenhum canal configurado.</div>';
        return;
      }
      const grupos = {};
      for (const ref of data.referencias) {
        if (!grupos[ref.channelName]) grupos[ref.channelName] = [];
        grupos[ref.channelName].push(ref);
      }
      el.innerHTML = Object.entries(grupos).map(([name, refs]) => `
        <div class="ref-group">
          <div class="ref-group__name">${escapeHtml(name)}</div>
          ${refs.map(ref => `
            <div class="ref-item">
              <span class="ref-item__url" title="${escapeHtml(ref.urlReferencia)}">↳ ${escapeHtml(ref.urlReferencia)}</span>
              <button class="ref-item__del" onclick="removerReferencia(${ref.rowIndex})" title="Remover">×</button>
            </div>`).join('')}
        </div>`).join('');
    } catch (e) {
      el.innerHTML = `<div class="status-text status-err">Erro: ${escapeHtml(e.message)}</div>`;
    }
  }

  async function executarReferencias() {
    const btn = document.getElementById('btn-executar-refs');
    btn.disabled = true;
    btn.textContent = '⏳ Executando...';
    try {
      const r = await fetch('/api/referencia/executar', { method: 'POST' });
      const data = await r.json();
      toast(data.mensagem || 'Ciclo iniciado.', 'info');
      setTimeout(() => { carregarDados(); carregarReferencias(); }, 3000);
    } catch (e) {
      toast('Erro: ' + e.message, 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = '▷ Executar Referências Agora';
    }
  }

  async function adicionarReferencia() {
    const channelKey = document.getElementById('ref-canal').value;
    const url        = document.getElementById('ref-url').value.trim();
    const statusEl   = document.getElementById('ref-status');

    if (!channelKey) { setStatus(statusEl, 'Selecione um canal.', 'err'); return; }
    if (!url)        { setStatus(statusEl, 'Informe a URL do canal.', 'err'); return; }

    setStatus(statusEl, 'Salvando...', 'info');
    try {
      const r = await fetch('/api/referencia', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ channelKey, urlReferencia: url }),
      });
      const data = await r.json();
      if (!data.success) throw new Error(data.error);
      document.getElementById('ref-url').value = '';
      setStatus(statusEl, 'Adicionado!', 'ok');
      carregarReferencias();
    } catch (e) {
      setStatus(statusEl, e.message, 'err');
    }
  }

  async function removerReferencia(rowIndex) {
    if (!confirm('Remover este canal de referência?')) return;
    try {
      const r = await fetch(`/api/referencia/${rowIndex}`, { method: 'DELETE' });
      const data = await r.json();
      if (!data.success) throw new Error(data.error);
      carregarReferencias();
    } catch (e) {
      toast('Erro ao remover: ' + e.message, 'error');
    }
  }

  // ── Adicionar à Fila ───────────────────────────────────────────────────────

  async function adicionarVideoNaFila() {
    const url        = document.getElementById('fila-url').value.trim();
    const channelKey = document.getElementById('fila-canal').value;
    const statusEl   = document.getElementById('fila-status');

    if (!url)        { setStatus(statusEl, 'Informe a URL do vídeo.', 'err'); return; }
    if (!channelKey) { setStatus(statusEl, 'Selecione um canal.', 'err'); return; }

    setStatus(statusEl, 'Baixando e enviando para o Drive...', 'info');

    const secBody = statusEl.closest('.section-body');
    secBody.querySelectorAll('button').forEach(b => b.disabled = true);

    try {
      const r = await fetch('/api/fila/adicionar', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ youtubeUrl: url, channelKey }),
      });
      const data = await r.json();
      if (!data.success) throw new Error(data.error);

      setStatus(statusEl, 'Adicionado: ' + data.title, 'ok');
      document.getElementById('fila-url').value = '';
      carregarDados();
    } catch (e) {
      setStatus(statusEl, e.message, 'err');
    } finally {
      secBody.querySelectorAll('button').forEach(b => b.disabled = false);
    }
  }

  // ── Corrigir SEO em lote ───────────────────────────────────────────────────

  async function corrigirSEOBatch() {
    const btn = document.getElementById('btn-corrigir-seo');
    btn.disabled = true;
    btn.textContent = '⏳ Corrigindo...';
    try {
      const r = await fetch('/api/corrigir-seo-batch', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ canais: ['canal-cristao', 'frutas-sinceronas'] }),
      });
      const data = await r.json();
      toast(data.mensagem || 'Iniciado.', 'info');
    } catch (e) {
      toast('Erro: ' + e.message, 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = '✎ Corrigir SEO (Cristão + Frutas)';
    }
  }

  // ── Helpers ────────────────────────────────────────────────────────────────

  function setStatus(el, msg, type) {
    el.className = `status-text status-${type}`;
    el.textContent = msg;
  }

  // ── Init ───────────────────────────────────────────────────────────────────
  carregarDados();
  carregarCanais();
  carregarReferencias();
  setInterval(carregarDados, 60000);
</script>

</body>
</html>
